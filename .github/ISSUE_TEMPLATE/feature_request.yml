name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        We welcome feature suggestions! Please describe your request clearly.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - New Agent / Pipeline Stage
        - Frontend UI / UX
        - API Endpoint
        - Knowledge Base / RAG
        - HITL & Approvals
        - Reporting & Analytics
        - Integrations
        - Performance / Scalability
        - Security
        - Developer Experience
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What pain point exists today?
      placeholder: "As a [role], I need to [goal] because [reason]..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?

  - type: dropdown
    id: priority
    attributes:
      label: Business Priority
      options:
        - Critical (blocking production use)
        - High (significant impact)
        - Medium (nice to have)
        - Low (minor enhancement)
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
