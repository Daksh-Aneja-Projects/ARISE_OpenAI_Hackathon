<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <defs>
    <!-- Deep Core Gradient -->
    <linearGradient id="core-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- Glowing Swarm Nodes -->
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="1"/>
      <stop offset="40%" stop-color="#3B82F6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <!-- Holographic filter -->
    <filter id="holo-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur1" />
      <feGaussianBlur stdDeviation="6" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="core-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#3B82F6" flood-opacity="0.9"/>
    </filter>
  </defs>

  <style>
    .text-title { fill: url(#core-grad); }
    .text-sub { fill: #3B82F6; }
    @media (prefers-color-scheme: dark) {
      .text-sub { fill: #06B6D4; }
    }
  </style>

  <g transform="translate(6, 0) scale(0.6)">
    <!-- Orbital Rings -->
    <g stroke="#3B82F6" stroke-width="0.75" fill="none" opacity="0.35" transform="translate(50, 50)">
      <ellipse cx="0" cy="0" rx="42" ry="14" transform="rotate(25)" />
      <ellipse cx="0" cy="0" rx="42" ry="14" transform="rotate(-35)" />
      <ellipse cx="0" cy="0" rx="42" ry="14" transform="rotate(80)" />
    </g>

    <!-- Neural Connections (Energy Webs) -->
    <path d="M50 50 L75 25 M50 50 L20 70 M50 50 L80 65 M50 50 L15 30 M50 50 L40 10 M50 50 L65 85 M50 50 L30 50" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="1 5" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Central Crystal Core (Isometric Data Block) -->
    <g transform="translate(50, 50)" filter="url(#core-glow)">
      <!-- Top face -->
      <polygon points="0,-18 15.58,-9 0,0 -15.58,-9" fill="url(#core-grad)" opacity="0.95" />
      <!-- Left face -->
      <polygon points="-15.58,-9 0,0 0,18 -15.58,9" fill="#2563EB" opacity="0.85" />
      <!-- Right face -->
      <polygon points="0,0 15.58,-9 15.58,9 0,18" fill="#6D28D9" opacity="0.85" />
      <!-- Internal Energy lines on crystal -->
      <polyline points="0,0 0,-18" stroke="#FFFFFF" stroke-width="0.8" opacity="0.5" />
      <polyline points="-15.58,-9 0,-18 15.58,-9" stroke="#FFFFFF" stroke-width="0.8" opacity="0.5" />
    </g>

    <!-- The 17 Agents (Glowing Orbs) -->
    <g fill="url(#node-glow)" filter="url(#holo-glow)">
      <!-- Agent 1-5 -->
      <circle cx="75" cy="25" r="3.5" />
      <circle cx="25" cy="75" r="2.5" />
      <circle cx="85" cy="55" r="3" />
      <circle cx="20" cy="70" r="4" />
      <circle cx="80" cy="30" r="2" />
      <!-- Agent 6-10 -->
      <circle cx="15" cy="40" r="2.5" />
      <circle cx="80" cy="65" r="3.5" />
      <circle cx="35" cy="15" r="2.5" />
      <circle cx="65" cy="85" r="3" />
      <circle cx="15" cy="30" r="4" />
      <!-- Agent 11-15 -->
      <circle cx="40" cy="10" r="2" />
      <circle cx="65" cy="15" r="2.5" />
      <circle cx="30" cy="50" r="3.5" />
      <circle cx="90" cy="45" r="2.5" />
      <circle cx="10" cy="60" r="2" />
      <!-- Agent 16-17 -->
      <circle cx="50" cy="85" r="2.5" />
      <circle cx="55" cy="35" r="1.5" />
    </g>

    <!-- Searing Core highlight -->
    <circle cx="50" cy="50" r="4.5" fill="#FFFFFF" filter="url(#holo-glow)"/>
  </g>

  <!-- ARISE wordmark -->
  <text x="76" y="36" class="text-title" font-family="'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif" font-weight="900" font-size="30" letter-spacing="4">ARISE</text>

  <!-- Tagline -->
  <text x="78" y="50" class="text-sub" font-family="'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif" font-weight="700" font-size="7.5" letter-spacing="1.5">AUTONOMOUS RFP INTELLIGENCE</text>
</svg>
